<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コンプリート！</title>

  <!-- 紙吹雪 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      margin-top: 120px;
      background: #ffffff;

      /* フェードイン */
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 40px;
      color: #153df1;
    }

    p {
      font-size: 20px;
      margin-top: 20px;
    }

    #next {
      margin-top: 40px;
      padding: 12px 20px;
      font-size: 18px;
      background: #153df1;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #next:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>🎉 Completed!! 🎉</h1>
  <p>スタンプ全部集めてくれてありがとう！</p>
  <p>そんなだいちゃんには...</p>

  <button id="next">NEXT</button>

  <script>
    // 紙吹雪（音なし）
    window.onload = () => {

      confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
      });

      setTimeout(() => {
        confetti({
          particleCount: 100,
          spread: 120,
          origin: { y: 0.4 }
        });
      }, 400);

    };

    // ラストワンへ（音あり）
    document.getElementById("next").onclick = () => {

      const sound = new Audio("sound.mp3");
      sound.play();

      setTimeout(() => {
        location.href = "lastone.html";
      }, 500);

    };
  </script>

</body>
</html>
