<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンプリート！</title>

  <!-- 紙吹雪 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-direction: column;
      
      padding-top: 250px;
      
      background: #ffffff;
      font-family: sans-serif;
      
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
      align-items: center;
      background: #ffffff;
      font-family: sans-serif;

      /* フェードイン */
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    .container {
      text-align: center;
      padding: 20px;
      width: 100%;
      max-width: 500px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    h1 {
      font-size: 40px;
      color: #153df1;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      margin: 10px 0;
    }

    #next {
      margin-top: 40px;
      padding: 12px 24px;
      font-size: 18px;
      background: #153df1;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    #next:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🎉 Complete!! 🎉</h1>

    <p>スタンプ全部集めてくれてありがとう！</p>
    <p>そんなだいちゃんには...</p>

    <button id="next">NEXT</button>

  </div>

 <script>
  // 紙吹雪
  window.onload = () => {

    confetti({
      particleCount: 150,
      spread: 80,
      origin: { y: 0.6 }
    });

    setTimeout(() => {
      confetti({
        particleCount: 100,
        spread: 120,
        origin: { y: 0.4 }
      });
    }, 400);

  };

  // ラストワンへ
  document.getElementById("next").onclick = () => {

    const sound = new Audio("sound.mp3");

    sound.play().catch(err => {
      console.log(err);
    });

    setTimeout(() => {
      location.href = "lastone.html";
    }, 1500);

  };
</script> 

</body>
</html>
