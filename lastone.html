<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAST ONE賞</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f7f3eb;
      font-family: "Hiragino Sans", sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .letter{
      background:#fffdf8;
      width:100%;
      max-width:420px;
      padding:40px 30px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,.15);
      text-align:center;
      position:relative;
    }

    .letter::before{
      content:"";
      position:absolute;
      top:15px;
      left:20px;
      right:20px;
      border-top:2px solid #e5d4b8;
    }

    h1{
      color:#d4a017;
      font-size:40px;
      margin-bottom:30px;
    }
    
    p{
      font-size:18px;
      line-height:1.9;
      color:#444;
      margin-bottom:18px;
    }

    .last{
      margin-top:30px;
      font-size:22px;
      font-weight:bold;
      color:#d4a017;
    }
  </style>
</head>
<body>

<div class="letter">

<h1>🎁 LAST ONE賞 🎁</h1>

<p>
ここまでのプレゼント、<br>
どうやったかな？
</p>

<p>
少しでも楽しんでもらえてたら<br>
嬉しいです😊
</p>

<p>
最後まで全部集めてくれて<br>
ありがとう！
</p>

<p>
最後のプレゼントは<br>
直接渡したいと思います。
</p>

<p class="last">
受け取ってね！🎉
</p>

</div>

</body>
</html>
